name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npx eslint . --max-warnings 0

      - name: Compile
        run: npm run build:test

      - name: Test
        run: node ./scripts/run-tests.js default

      - name: Build
        run: node ./scripts/build.js
