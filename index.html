    <script>
    (function () {
      var errorCount = 0;
      function showCrashScreen(message) {
        if (errorCount > 1) return;
        var root = document.getElementById("appRoot");
        if (!root) return;
        root.innerHTML = "";
        var wrapper = document.createElement("div");
        wrapper.setAttribute("style", "max-width:480px;margin:80px auto;padding:32px;text-align:center;font-family:sans-serif;color:#e8d5b5");
        var h1 = document.createElement("h1");
        h1.setAttribute("style", "font-size:1.5rem;margin-bottom:16px");
        h1.textContent = "Something went wrong";
        var p = document.createElement("p");
        p.setAttribute("style", "color:#baa993;margin-bottom:24px");
        p.textContent = message;
        var btn = document.createElement("button");
        btn.setAttribute("style", "padding:10px 24px;background:#8b6914;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:1rem");
        btn.textContent = "Reload";
        btn.addEventListener("click", function () { location.reload(); });
        wrapper.appendChild(h1);
        wrapper.appendChild(p);
        wrapper.appendChild(btn);
        root.appendChild(wrapper);
      }
      window.onerror = function (msg, source, line) {
        errorCount++;
        console.error("Uncaught error:", msg, "at", source, ":" + line);
        showCrashScreen("An unexpected error occurred. Your save data is safe.");
      };
      window.addEventListener("unhandledrejection", function (event) {
        errorCount++;
        console.error("Unhandled promise rejection:", event.reason);
        showCrashScreen("An unexpected error occurred. Your save data is safe.");
      });
    })();
    </script>
